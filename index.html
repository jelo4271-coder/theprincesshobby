<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>난 공주고 이건 취미다</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; --border: #e2e8f0; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; font-family: sans-serif; }
        header { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        h1 { font-size: 1.5rem; color: var(--primary); margin: 0; }
        #room-info { font-weight: bold; }
        .calendar-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 10px; min-height: 150px; cursor: pointer; }
        .day-num { font-weight: bold; margin-bottom: 8px; display: block; }
        .todo-item { font-size: 0.85rem; background: #f1f5f9; padding: 4px; border-radius: 4px; margin-bottom: 4px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; padding: 20px; border-radius: 12px; width: 300px; }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>난 공주고 이건 취미다</h1>
        <div id="room-info">로딩 중...</div>
    </header>

    <div class="calendar-grid" id="calendar"></div>

    <!-- 입장 모달 -->
    <div class="modal-overlay" id="room-modal">
        <div class="modal-box">
            <h3>방 번호를 입력하세요</h3>
            <input type="text" id="room-input" placeholder="예: study01">
            <button onclick="joinRoom()">입장하기</button>
        </div>
    </div>

    <!-- Firebase SDK & 로직 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 네 Firebase 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyAI_DvCJfHGDaDSApdy6IUmrEoapOPnTHc",
            authDomain: "miracle-of-100day.firebaseapp.com",
            projectId: "miracle-of-100day",
            storageBucket: "miracle-of-100day.firebasestorage.app",
            messagingSenderId: "595101117042",
            appId: "1:595101117042:web:415de9eca28be0d1e4f0eb",
            measurementId: "G-1PXC7FENDC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let roomId = localStorage.getItem('study_room_id');
        let todos = {};

        window.joinRoom = () => {
            const val = document.getElementById('room-input').value;
            if(!val) return;
            localStorage.setItem('study_room_id', val);
            location.reload();
        }

        if(!roomId) {
            document.getElementById('room-modal').classList.add('active');
        } else {
            document.getElementById('room-info').innerText = `현재 방: ${roomId}`;
            onSnapshot(doc(db, "rooms", roomId), (doc) => {
                todos = doc.exists() ? (doc.data().todos || {}) : {};
                renderCalendar();
            });
        }

        async function addGoal(day) {
            const text = prompt("목표를 적으세요:");
            if(!text) return;
            if(!todos[day]) todos[day] = [];
            todos[day].push(text);
            await setDoc(doc(db, "rooms", roomId), { todos });
        }

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const day = i.toString();
                const div = document.createElement('div');
                div.className = 'day-card';
                div.innerHTML = `<span class="day-num">${i}일</span>` + 
                    (todos[day] ? todos[day].map(t => `<div class="todo-item">${t}</div>`).join('') : '');
                div.onclick = () => addGoal(day);
                cal.appendChild(div);
            }
        }
    </script>
</body>
</html>
