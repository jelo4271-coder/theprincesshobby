<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>난 공주고 수능은 취미다</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAI_DvCJfHGDaDSApdy6IUmrEoapOPnTHc",
            authDomain: "miracle-of-100day.firebaseapp.com",
            databaseURL: "https://miracle-of-100day-default-rtdb.firebaseio.com",
            projectId: "miracle-of-100day",
            storageBucket: "miracle-of-100day.firebasestorage.app",
            messagingSenderId: "595101117042",
            appId: "1:595101117042:web:ef6fbaa9ba1d4a6fe4f0eb",
            measurementId: "G-TH0ETTEKW3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let myRoom = localStorage.getItem('studyRoom');
        let myName = localStorage.getItem('myName');

        // 방/이름 설정 함수 (버튼용)
        function setProfile() {
            myRoom = prompt("공유할 방 이름을 입력하세요 (친구와 같은 이름을 입력하세요)", myRoom || "");
            myName = prompt("본인의 이름을 입력하세요", myName || "");
            if (myRoom && myName) {
                localStorage.setItem('studyRoom', myRoom);
                localStorage.setItem('myName', myName);
                location.reload();
            }
        }

        if (!myRoom || !myName) {
            setProfile();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('welcome-title').innerText = `[${myRoom}] ${myName}님 환영해요`;
        });
    </script>

    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; position: relative; overflow-x: hidden; }

        header {
            max-width: 1200px; margin: 0 auto 15px auto; display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 15px 25px; border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); z-index: 60; position: relative;
        }
        h1 { font-size: 1.4rem; color: var(--primary); font-weight: 800; }
        .controls { display: flex; gap: 8px; align-items: center; z-index: 60; }
        button, .file-label {
            background: var(--primary); color: white; border: none; padding: 8px 14px;
            border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;
            font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px;
        }
        button:hover { opacity: 0.9; }
        .btn-room { background: #64748b; }
        .btn-lock { background: #10b981; }
        .btn-lock.locked { background: #ef4444; }
        #sticker-input { display: none; }

        .view-tabs { max-width: 1200px; margin: 0 auto 15px auto; display: flex; gap: 8px; justify-content: center; }
        .view-btn { background: #cbd5e1; color: #475569; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; border: none; }
        .view-btn.active { background: var(--primary); color: white; }

        .week-tabs { max-width: 1200px; margin: 0 auto 20px auto; display: flex; gap: 6px; overflow-x: auto; padding-bottom: 5px; position: relative; z-index: 50; }
        .week-btn { background: #e2e8f0; color: #475569; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; border: none; white-space: nowrap; }
        .week-btn.active { background: var(--primary); color: white; }

        .calendar-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; position: relative; z-index: 10; }
        @media (max-width: 900px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }

        .day-card { background: var(--card-bg); border-radius: 14px; padding: 15px; min-height: 220px; display: flex; flex-direction: column; border: 1px solid var(--border); position: relative; z-index: 10; }
        .day-header { font-weight: bold; margin-bottom: 10px; color: #64748b; font-size: 0.9rem; display: flex; justify-content: space-between; }
        .day-title { color: var(--primary); font-weight: 800; font-size: 1.05rem; }
        .todo-list { flex-grow: 1; list-style: none; overflow-y: auto; max-height: 160px; }
        .todo-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; margin-bottom: 6px; padding: 6px; border-radius: 6px; background: #f1f5f9; cursor: pointer; }
        .btn-add-todo { background: transparent; color: #64748b; border: 1px dashed #cbd5e1; width: 100%; padding: 8px; margin-top: 10px; border-radius: 6px; cursor: pointer; }

        .tracker-section { max-width: 1200px; margin: 30px auto 0 auto; background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border); position: relative; z-index: 10; }
        .progress-bar-fill { height: 16px; background: linear-gradient(90deg, #4f46e5, #818cf8); width: 0%; border-radius: 8px; transition: width 0.4s ease; }

        /* 스티커 레이어 */
        #sticker-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; pointer-events: none; }
        .sticker { position: absolute; display: inline-block; cursor: grab; padding: 5px; border: 1px dashed rgba(0,0,0,0.4); background: rgba(255,255,255,0.2); z-index: 45; min-width: 50px; min-height: 50px; width: 120px; height: 120px; pointer-events: auto; }
        #sticker-layer.locked .sticker { border: none; background: transparent; cursor: default; pointer-events: none; }
        .sticker img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <h1 id="welcome-title">환영합니다</h1>
        <div class="controls">
            <button class="btn-room" onclick="setProfile()">방 변경</button>
            <label for="sticker-input" class="file-label">스티커</label>
            <input type="file" id="sticker-input" accept="image/*">
            <button id="lock-btn" class="btn-lock" onclick="toggleStickerLock()">편집</button>
        </div>
    </header>

    <div class="view-tabs">
        <button class="view-btn active" onclick="changeView('all', this)">모두 보기</button>
        <button class="view-btn" onclick="changeView('me', this)">내 할 일</button>
        <button class="view-btn" onclick="changeView('friend', this)">친구</button>
    </div>

    <div class="week-tabs" id="week-tabs"></div>
    <div class="calendar-grid" id="calendar"></div>

    <div class="tracker-section">
        <div class="tracker-header" style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>전체 목표 달성률</span>
            <span id="progress-text">0%</span>
        </div>
        <div style="width: 100%; background: #e2e8f0; border-radius: 8px;">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="sticker-layer"></div>

    <script>
        // --- 간소화된 데이터 로직 ---
        let todos = {};
        let currentView = 'all';
        let isLocked = false;
        let activeSticker = null;
        let offsetX = 0, offsetY = 0;

        database.ref('todos/' + myRoom).on('value', (snapshot) => {
            todos = snapshot.val() || {};
            renderCalendar();
        });

        function saveToFirebase() { database.ref('todos/' + myRoom).set(todos); }

        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendarEl.innerHTML = '';
            // (생략된 렌더링 로직은 이전과 동일하게 유지함 - 코드 길어짐 방지)
            // 실제 구현 시 이전 코드의 renderCalendar 전체 내용을 여기에 붙여넣으세요.
            // (혹시 이 부분도 통으로 필요하면 말해달라긔!)
        }

        // --- 스티커 로직 수정 ---
        function toggleStickerLock() {
            isLocked = !isLocked;
            const layer = document.getElementById('sticker-layer');
            const btn = document.getElementById('lock-btn');
            if (isLocked) { layer.classList.add('locked'); btn.classList.add('locked'); btn.innerText = '잠금'; }
            else { layer.classList.remove('locked'); btn.classList.remove('locked'); btn.innerText = '편집'; }
        }

        function createSticker(src, left, top) {
            const div = document.createElement('div');
            div.className = 'sticker';
            div.style.left = left + 'px'; div.style.top = top + 'px';
            div.innerHTML = `<img src="${src}" alt="sticker">`;
            div.addEventListener('mousedown', (e) => {
                if (isLocked) return;
                activeSticker = div;
                offsetX = e.clientX - div.offsetLeft; 
                offsetY = e.clientY - div.offsetTop;
            });
            document.getElementById('sticker-layer').appendChild(div);
        }

        document.addEventListener('mousemove', (e) => {
            if (!activeSticker || isLocked) return;
            let newY = e.clientY - offsetY;
            
            // 160px 위로는 못 올라가게!
            if (newY < 160) newY = 160;
            
            activeSticker.style.left = (e.clientX - offsetX) + 'px';
            activeSticker.style.top = newY + 'px';
        });

        document.addEventListener('mouseup', () => { activeSticker = null; });

        document.getElementById('sticker-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => createSticker(ev.target.result, 150, 160);
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
